version: "3.1"

rules:
# --- 1. THE LOOP ---
- rule: Activate Message Form
  steps:
  - intent: send_message
  - action: message_form
  - active_loop: message_form

# --- 2. CONFIRMATION (Triggers only when the form has all 3 slots) ---
- rule: Submit Form and Confirm
  condition:
  - active_loop: message_form
  steps:
  - action: message_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: utter_confirm_details

# --- 3. EXECUTION & CANCELLATION ---
- rule: Execute if YES
  steps:
  - action: utter_confirm_details
  - intent: affirm
  - action: utter_message_sent

- rule: Cancel if NO
  steps:
  - action: utter_confirm_details
  - intent: deny
  - action: utter_canceled

# --- 4. MODIFICATIONS ---
- rule: Handle modify contact
  steps:
  - intent: modify_contact
  - action: utter_acknowledge_change_contact

- rule: Handle modify message
  steps:
  - intent: modify_message
  - action: utter_acknowledge_change_message

- rule: Force manual confirmation
  steps:
  - intent: request_confirmation
  - action: utter_confirm_details